# Production: Postgres + Redis + Medusa + Storefront + Nginx Proxy Manager
#
# Giao diện quản trị reverse proxy (SSL, domain): Nginx Proxy Manager — http://SERVER_IP:81
# (image jc21/nginx-proxy-manager; KHÔNG phải nginx:alpine ở medusa-lb — medusa-lb chỉ LB nội bộ, không có UI).
#
# Trên server (sau khi clone repo):
#   bash deploy/oneclick-prod.sh
#
# Hướng dẫn NPM: xem deploy/DEPLOY.md
#
# Du lieu lau dai: named volumes (postgres_data, redis_data, medusa_uploads, npm_*).
# `oneclick-prod.sh update` KHÔNG xoá volume — chỉ rebuild + restart + migrate.

name: ecomerce-viet-lol-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Không expose ra host trong production (chỉ nội bộ Docker network).
    healthcheck:
      # Giữ POSTGRES_USER/POSTGRES_DB mặc định medusa/medusa hoặc sửa lệnh cho khớp
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # Không expose ra host trong production (chỉ nội bộ Docker network).
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app

  medusa-backend-1: &medusa
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    environment:
      # Ưu tiên DATABASE_URL nếu bạn set sẵn (để URL-encode password khi có ký tự đặc biệt như '@').
      # Fallback vẫn giữ như cũ cho password đơn giản.
      #
      # Lưu ý: Postgres container nội bộ không bật SSL.
      # KHÔNG thêm `?ssl=false` vào URL vì một số parser coi "ssl=false" là truthy và sẽ bật SSL.
      # Dùng `sslmode=disable` (chuẩn libpq) để tắt SSL một cách rõ ràng.
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-medusa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medusa}?sslmode=disable}

      # Ép tắt SSL cho libpq/clients khi có env/driver tự bật SSL.
      PGSSLMODE: disable
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      JWT_SECRET: ${JWT_SECRET:?}
      COOKIE_SECRET: ${COOKIE_SECRET:?}
      STOREFRONT_REVALIDATE_URL: ${STOREFRONT_REVALIDATE_URL:-http://storefront:8000}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:?}
      CMS_PREVIEW_SECRET: ${CMS_PREVIEW_SECRET:-}
      # Tuỳ chọn: path trong container tới thư mục chứa subfolder *Sales Kit* (mặc định /app/docs qua mount).
      SALES_KIT_DOCS_PATH: ${SALES_KIT_DOCS_PATH:-}
    volumes:
      - medusa_uploads:/app/apps/backend/static
      # Sales Kit seed (seed-sales-kit) đọc docs/…*Sales Kit*; không COPY vào image để tránh image quá nặng.
      - ../docs:/app/docs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Chỉ localhost: tránh lộ API ra ngoài khi đã có NPM; vẫn tiện dev local + trình duyệt gọi NEXT_PUBLIC_*.
      - "127.0.0.1:9000:9000"
    networks:
      - app

  # Nếu cần scale, có thể thêm medusa-backend-2 và LB sau.

  storefront:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.storefront
      args:
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:?}
        MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:?}
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL:?}
        REVALIDATE_SECRET: ${REVALIDATE_SECRET:?}
        NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-vn}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:?}
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL:?}
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:?}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:?}
      NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-vn}
    depends_on:
      - medusa-backend-1
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - app

  # Nginx Proxy Manager — bản có giao diện web (đăng nhập lần đầu tại http://IP:81).
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  medusa_uploads:
  npm_data:
  npm_letsencrypt:
