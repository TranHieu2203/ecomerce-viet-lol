# Production: Postgres + Redis + Medusa x2 + Nginx LB + Storefront + Nginx Proxy Manager
#
# Giao diện quản trị reverse proxy (SSL, domain): Nginx Proxy Manager — http://SERVER_IP:81
# (image jc21/nginx-proxy-manager; KHÔNG phải nginx:alpine ở medusa-lb — medusa-lb chỉ LB nội bộ, không có UI).
#
# Trên server (sau khi clone repo):
#   chỉnh deploy/.env.production (đổi mọi CHANGE_ME_* — file có sẵn trong repo theo domain quatangtaya.com)
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.production up -d --build
#
# Hướng dẫn NPM: deploy/nginx-proxy-manager.md
#
# Du lieu lau dai: named volumes (postgres_data, redis_data, medusa_uploads, npm_*).
# `docker compose up --build` / `deploy-on-server.sh update` KHONG xoa volume — chi rebuild image.

name: ecomerce-viet-lol-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Chi localhost tren VPS — dung voi ssh-data-tunnel.bat (PostgreSQL ve may local)
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      # Giữ POSTGRES_USER/POSTGRES_DB mặc định medusa/medusa hoặc sửa lệnh cho khớp
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # Chi localhost tren VPS — dung voi ssh-data-tunnel.bat (Redis ve may local)
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app

  medusa-backend-1: &medusa
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-medusa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medusa}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      JWT_SECRET: ${JWT_SECRET:?}
      COOKIE_SECRET: ${COOKIE_SECRET:?}
      STOREFRONT_REVALIDATE_URL: ${STOREFRONT_REVALIDATE_URL:-http://storefront:8000}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:?}
      CMS_PREVIEW_SECRET: ${CMS_PREVIEW_SECRET:-}
    volumes:
      - medusa_uploads:/app/apps/backend/static
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  medusa-backend-2:
    <<: *medusa
    volumes:
      - medusa_uploads:/app/apps/backend/static

  # Nginx thuần — không có UI; chỉ cân bằng 2 Medusa. UI quản trị nằm ở service nginx-proxy-manager (:81).
  medusa-lb:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx-medusa-lb.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - medusa-backend-1
      - medusa-backend-2
    networks:
      - app

  storefront:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.storefront
      args:
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:?}
        MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:?}
        REVALIDATE_SECRET: ${REVALIDATE_SECRET:?}
        NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-vn}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:?}
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:?}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:?}
      NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-vn}
    depends_on:
      - medusa-lb
    networks:
      - app

  # Nginx Proxy Manager — bản có giao diện web (đăng nhập lần đầu tại http://IP:81).
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  medusa_uploads:
  npm_data:
  npm_letsencrypt:
