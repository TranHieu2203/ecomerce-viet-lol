# Load balance 2 instance Medusa (sticky theo IP — ổn định upload/session hơn round-robin thuần)
upstream medusa_backends {
    ip_hash;
    server medusa-backend-1:9000;
    server medusa-backend-2:9000;
}

server {
    listen 9000;
    server_name _;

    client_max_body_size 50m;

    location / {
        proxy_pass http://medusa_backends;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
